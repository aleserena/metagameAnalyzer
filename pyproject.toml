[project]
name = "mtgtop8scrapper"
version = "0.1.0"
description = "MTG Top 8 scraper and metagame analyzer"
readme = "README.md"
requires-python = ">=3.10"

[tool.ruff]
target-version = "py310"
line-length = 120
src = ["api", "src", "main.py", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# These modules manipulate sys.path (or are autogenerated) before importing, so
# imports legitimately appear after statements (E402) and out of isort order (I001).
# Real bugs (F-codes, other E/W) are still enforced everywhere.
"api/main.py" = ["E402", "I001"]
"src/mtgtop8/scraper.py" = ["E402", "I001"]
"alembic/env.py" = ["E402", "I001"]
"alembic/versions/*" = ["I001"]
"scripts/*" = ["E402", "I001"]
"tests/*" = ["E402", "I001"]
"api/services/settings.py" = ["I001"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["src", "api"]
omit = ["alembic/*", "*/__init__.py"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true
